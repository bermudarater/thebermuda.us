<svg xmlns="http://www.w3.org/2000/svg" width="780" height="540" viewBox="0 0 780 540" font-family="Poppins, 'Segoe UI', sans-serif">
  <title>AI agents run on Bermuda: tools and real-time carrier data, connected to your agency systems</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0 0 L10 5 L0 10 z" fill="#5A47FB"/>
    </marker>
  </defs>

  <!-- Ground shadow -->
  <ellipse cx="390" cy="496" rx="240" ry="16" fill="#120879" opacity="0.08"/>

  <!-- Platform stack -->
  <g>
    <rect x="190" y="420" width="400" height="64" rx="14" fill="#120879"/>
    <text x="390" y="458" text-anchor="middle" fill="#ffffff" font-size="16" font-weight="600" letter-spacing="2">REAL-TIME CARRIER DATA</text>

    <rect x="230" y="354" width="320" height="56" rx="12" fill="#5A47FB"/>
    <text x="390" y="382" text-anchor="middle" fill="#ffffff" font-size="13.5" font-weight="600" letter-spacing="1">TOOLS</text>
    <text x="390" y="399" text-anchor="middle" fill="#E6E2FF" font-size="12" font-weight="500" letter-spacing="1">QUOTE &#183; BIND &#183; PAY &#183; UPLOAD</text>

    <rect x="282" y="300" width="216" height="44" rx="10" fill="#F1EFFF" stroke="#5A47FB" stroke-width="2"/>
    <text x="390" y="328" text-anchor="middle" fill="#120879" font-size="14" font-weight="600" letter-spacing="2">AGENTIC AI</text>
  </g>

  <!-- Robot agent standing on the stack -->
  <g>
    <animateTransform attributeName="transform" type="translate" values="0 0; 0 -5; 0 0" dur="4s" repeatCount="indefinite" calcMode="spline" keySplines="0.45 0 0.55 1; 0.45 0 0.55 1"/>
    <!-- antenna -->
    <line x1="390" y1="120" x2="390" y2="138" stroke="#5A47FB" stroke-width="3" stroke-linecap="round"/>
    <circle cx="390" cy="114" r="6" fill="#5A47FB">
      <animate attributeName="r" values="6;7.5;6" dur="2s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;0.6;1" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- head -->
    <rect x="352" y="138" width="76" height="60" rx="16" fill="#5A47FB"/>
    <circle cx="375" cy="164" r="7" fill="#ffffff"/>
    <circle cx="405" cy="164" r="7" fill="#ffffff"/>
    <path d="M376 182q14 10 28 0" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round"/>
    <!-- body -->
    <rect x="344" y="206" width="92" height="74" rx="18" fill="#ffffff" stroke="#120879" stroke-width="3"/>
    <!-- chevron mark on chest -->
    <path d="M372 228l14 15-14 15" fill="none" stroke="#5A47FB" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M394 228l14 15-14 15" fill="none" stroke="#120879" stroke-width="5" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- arms -->
    <line x1="344" y1="232" x2="318" y2="252" stroke="#120879" stroke-width="6" stroke-linecap="round"/>
    <line x1="436" y1="232" x2="462" y2="252" stroke="#120879" stroke-width="6" stroke-linecap="round"/>
    <!-- sparkles -->
    <text x="318" y="142" fill="#5A47FB" font-size="22">&#10022;<animate attributeName="opacity" values="1;0.25;1" dur="2.4s" repeatCount="indefinite"/></text>
    <text x="448" y="124" fill="#5A47FB" font-size="16">&#10022;<animate attributeName="opacity" values="0.3;1;0.3" dur="3.1s" repeatCount="indefinite"/></text>
    <text x="464" y="186" fill="#B7ACFF" font-size="14">&#10022;<animate attributeName="opacity" values="1;0.2;1" dur="2.8s" repeatCount="indefinite"/></text>
  </g>

  <!-- Ecosystem nodes -->
  <!-- Leads (top left) -->
  <g>
    <circle cx="120" cy="186" r="34" fill="#ffffff" stroke="#5A47FB" stroke-width="3"/>
    <circle cx="120" cy="176" r="9" fill="none" stroke="#5A47FB" stroke-width="3"/>
    <path d="M102 204c2-10 9-15 18-15s16 5 18 15" fill="none" stroke="#5A47FB" stroke-width="3" stroke-linecap="round"/>
    <text x="120" y="240" text-anchor="middle" fill="#120879" font-size="14" font-weight="600">LEADS</text>
  </g>

  <!-- CRM (bottom left) -->
  <g>
    <circle cx="106" cy="392" r="34" fill="#ffffff" stroke="#5A47FB" stroke-width="3"/>
    <rect x="90" y="378" width="32" height="28" rx="5" fill="none" stroke="#5A47FB" stroke-width="3"/>
    <line x1="90" y1="388" x2="122" y2="388" stroke="#5A47FB" stroke-width="3"/>
    <line x1="100" y1="394" x2="112" y2="394" stroke="#5A47FB" stroke-width="3" stroke-linecap="round"/>
    <text x="106" y="446" text-anchor="middle" fill="#120879" font-size="14" font-weight="600">CRM</text>
  </g>

  <!-- Carrier portals (top right) -->
  <g>
    <circle cx="660" cy="186" r="34" fill="#ffffff" stroke="#5A47FB" stroke-width="3"/>
    <path d="M644 192c-5 0-9-4-9-9 0-4 3-8 7-9 1-6 6-10 12-10 5 0 9 3 11 7 1 0 2-1 3-1 5 0 9 4 9 9s-4 10-9 10z" fill="none" stroke="#5A47FB" stroke-width="3" stroke-linejoin="round"/>
    <text x="660" y="234" text-anchor="middle" fill="#120879" font-size="14" font-weight="600">CARRIER</text>
    <text x="660" y="252" text-anchor="middle" fill="#120879" font-size="14" font-weight="600">PORTALS</text>
  </g>

  <!-- AMS (bottom right) -->
  <g>
    <circle cx="674" cy="392" r="34" fill="#ffffff" stroke="#5A47FB" stroke-width="3"/>
    <rect x="662" y="376" width="24" height="32" rx="4" fill="none" stroke="#5A47FB" stroke-width="3"/>
    <line x1="668" y1="386" x2="680" y2="386" stroke="#5A47FB" stroke-width="3" stroke-linecap="round"/>
    <line x1="668" y1="393" x2="680" y2="393" stroke="#5A47FB" stroke-width="3" stroke-linecap="round"/>
    <line x1="668" y1="400" x2="676" y2="400" stroke="#5A47FB" stroke-width="3" stroke-linecap="round"/>
    <text x="674" y="446" text-anchor="middle" fill="#120879" font-size="14" font-weight="600">AMS</text>
  </g>

  <!-- Dashed connectors into the platform -->
  <g stroke="#5A47FB" stroke-width="2.5" stroke-dasharray="6 7" fill="none" opacity="0.8">
    <path d="M158 196c46 22 86 70 116 116" marker-end="url(#arrow)">
      <animate attributeName="stroke-dashoffset" from="13" to="0" dur="1.4s" repeatCount="indefinite"/>
    </path>
    <path d="M146 386c34 14 64 34 92 50" marker-end="url(#arrow)">
      <animate attributeName="stroke-dashoffset" from="13" to="0" dur="1.4s" repeatCount="indefinite"/>
    </path>
    <path d="M622 196c-46 22-86 70-116 116" marker-start="url(#arrow)">
      <animate attributeName="stroke-dashoffset" from="0" to="13" dur="1.4s" repeatCount="indefinite"/>
    </path>
    <path d="M634 386c-34 14-64 34-92 50" marker-start="url(#arrow)">
      <animate attributeName="stroke-dashoffset" from="0" to="13" dur="1.4s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- Data dots rising through the stack -->
  <g fill="#5A47FB">
    <circle cx="305" r="5">
      <animate attributeName="cy" values="458;316" dur="3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.2;0.8;1" dur="3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="305" r="5">
      <animate attributeName="cy" values="458;316" dur="3s" begin="1.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.2;0.8;1" dur="3s" begin="1.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="475" r="5">
      <animate attributeName="cy" values="458;316" dur="3s" begin="0.75s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.2;0.8;1" dur="3s" begin="0.75s" repeatCount="indefinite"/>
    </circle>
    <circle cx="475" r="5">
      <animate attributeName="cy" values="458;316" dur="3s" begin="2.25s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0;0.9;0.9;0" keyTimes="0;0.2;0.8;1" dur="3s" begin="2.25s" repeatCount="indefinite"/>
    </circle>
  </g>
</svg>
